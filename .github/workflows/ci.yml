name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        cd app
        pip install -r requirements.txt
    - name: Run Tests
      run: |
        cd app
        pip install pytest
        pytest
    - name: Build Docker Image
      run: |
        cd app
        docker build -t cicd-demo .
   deploy:

needs: build

runs-on: ubuntu-latest

steps:

- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_PRIVATE_KEY }}

    script: |
      cd ~/cicd-flask-demo/app

      git pull origin main

      sudo docker stop cicd-demo || true
      sudo docker rm cicd-demo || true

      sudo docker build -t cicd-demo .

      sudo docker run -d -p 5000:5000 --name cicd-demo cicd-demo
